name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-api:
    name: Deploy API to Cloudflare Workers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --no-frozen-lockfile
      - name: Build API
        run: pnpm --filter @workspace/api-server run build
        env:
          PORT: "8080"
      - name: Deploy API Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: artifacts/api-server
          secrets: |
            DATABASE_URL
            SESSION_SECRET
            SUPER_ADMIN_USERNAME
            SUPER_ADMIN_PASSWORD
            EWAY_BILL_COMPANY_CODE
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          SUPER_ADMIN_USERNAME: ${{ secrets.SUPER_ADMIN_USERNAME }}
          SUPER_ADMIN_PASSWORD: ${{ secrets.SUPER_ADMIN_PASSWORD }}
          EWAY_BILL_COMPANY_CODE: ${{ secrets.EWAY_BILL_COMPANY_CODE }}

  deploy-frontend:
    name: Deploy Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --no-frozen-lockfile
      - name: Build Frontend
        run: pnpm --filter @workspace/eway-bill run build
        env:
          NODE_ENV: production
          BASE_PATH: /
          PORT: "5173"
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
      - name: Deploy Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy artifacts/eway-bill/dist/public --project-name=legacy-eway-bill --branch=main
