name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-api:
    name: Deploy API to Cloudflare Workers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build API
        run: pnpm --filter @workspace/api-server run build
        env:
          PORT: "8080"

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy API Worker
        run: wrangler deploy
        working-directory: artifacts/api-server
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Worker secrets
        run: |
          printf '%s' "$DATABASE_URL" | wrangler secret put DATABASE_URL --name legacy-ewaybill-api
          printf '%s' "$SESSION_SECRET" | wrangler secret put SESSION_SECRET --name legacy-ewaybill-api
          printf '%s' "$SUPER_ADMIN_USERNAME" | wrangler secret put SUPER_ADMIN_USERNAME --name legacy-ewaybill-api
          printf '%s' "$SUPER_ADMIN_PASSWORD" | wrangler secret put SUPER_ADMIN_PASSWORD --name legacy-ewaybill-api
          printf '%s' "$EWAY_BILL_COMPANY_CODE" | wrangler secret put EWAY_BILL_COMPANY_CODE --name legacy-ewaybill-api
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          SUPER_ADMIN_USERNAME: ${{ secrets.SUPER_ADMIN_USERNAME }}
          SUPER_ADMIN_PASSWORD: ${{ secrets.SUPER_ADMIN_PASSWORD }}
          EWAY_BILL_COMPANY_CODE: ${{ secrets.EWAY_BILL_COMPANY_CODE }}

  deploy-frontend:
    name: Deploy Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Frontend
        run: pnpm --filter @workspace/eway-bill run build
        env:
          NODE_ENV: production
          BASE_PATH: /
          PORT: "5173"
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy Pages
        run: wrangler pages deploy artifacts/eway-bill/dist/public --project-name=legacy-eway-bill --branch=main
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
