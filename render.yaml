services:
  - type: web
    name: Legacy-Business-E-WAY-BILL-Generator-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: Legacy-Business-E-WAY-BILL-Generator-db
          property: connectionString

  - type: web
    name: Legacy-Business-E-WAY-BILL-Generator
    runtime: static
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && BASE_PATH=/ PORT=3000 pnpm --filter @workspace/eway-bill run build
    staticPublishPath: artifacts/eway-bill/dist/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_ENV
        value: production

databases:
  - name: Legacy-Business-E-WAY-BILL-Generator-db
    region: oregon
    plan: free
    databaseName: eway_bill
    user: eway_admin
