services:
  - type: web
    name: legacy-eway-bill-api
    runtime: node
    region: singapore
    plan: free
    rootDir: .
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@10.26.1 --activate &&
      pnpm install &&
      pnpm --filter @workspace/db run push-force &&
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: eway-bill-db
          property: connectionString

  - type: web
    name: legacy-eway-bill
    runtime: node
    region: singapore
    plan: free
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@10.26.1 --activate &&
      pnpm install &&
      VITE_API_BASE_URL=https://legacy-eway-bill-api.onrender.com BASE_PATH=/ NODE_ENV=production pnpm --filter @workspace/eway-bill run build
    startCommand: npx serve -s artifacts/eway-bill/dist/public -l $PORT
    envVars:
      - key: BASE_PATH
        value: "/"
      - key: NODE_ENV
        value: production
      - key: VITE_API_BASE_URL
        value: "https://legacy-eway-bill-api.onrender.com"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: eway-bill-db
    region: singapore
    plan: free
