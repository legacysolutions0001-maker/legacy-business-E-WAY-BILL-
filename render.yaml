services:
  - type: web
    name: Legacy-Business-E-WAY-BILL-Generator
    runtime: node
    region: singapore
    plan: free
    rootDir: .
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@10.26.1 --activate &&
      pnpm install &&
      BASE_PATH=/ PORT=3000 pnpm --filter @workspace/eway-bill run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: legacy-sports-db
          property: connectionString
