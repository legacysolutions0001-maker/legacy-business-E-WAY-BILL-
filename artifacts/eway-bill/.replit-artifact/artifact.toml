kind = "web"
previewPath = "/"
title = "E-Way Bill Management"
version = "1.0.0"
id = "artifacts/eway-bill"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20540

[services.development]
run = "pnpm --filter @workspace/eway-bill run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/eway-bill", "run", "build" ]
publicDir = "artifacts/eway-bill/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20540"
BASE_PATH = "/"
